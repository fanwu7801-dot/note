<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .box { fill:#f8fbff; stroke:#2b6ea3; stroke-width:2 }
    .small { fill:#e6f2ff; stroke:#2b6ea3; stroke-width:1.5 }
    .text { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#0b2940 }
    .title { font-size:18px; font-weight:700 }
    .arrow { stroke:#666; stroke-width:2; fill:none; marker-end: url(#arrowhead) }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Top handler box -->
  <rect x="220" y="40" width="760" height="110" class="box" rx="8"/>
  <text x="600" y="80" text-anchor="middle" class="text title">LED_Handler</text>
  <text x="600" y="105" text-anchor="middle" class="text">管理多个 LED 实例 / 桥接 HAL 操作</text>

  <!-- small handler file box on left inside top area -->
  <rect x="56" y="60" width="140" height="64" class="small" rx="6"/>
  <text x="126" y="85" class="text" text-anchor="middle">ec_bsp_led_handler.c</text>
  <text x="126" y="102" class="text" text-anchor="middle">ec_bsp_led_handler.h</text>
  <!-- dotted connector to top box -->
  <line x1="196" y1="92" x2="220" y2="92" stroke="#2b6ea3" stroke-dasharray="6,4" stroke-width="1.5"/>

  <!-- LED instance boxes -->
  <!-- positions for 6 instances -->
  <!-- Instance 1 -->
  <rect x="60" y="220" width="160" height="120" class="box" rx="6"/>
  <text x="140" y="245" class="text">LED#1_instance</text>
  <text x="140" y="265" class="text">频率: 1.1s</text>
  <text x="140" y="283" class="text">亮灭次数: 3次</text>
  <line x1="140" y1="340" x2="140" y2="420" class="arrow"/>

  <!-- Instance 2 -->
  <rect x="240" y="220" width="160" height="120" class="box" rx="6"/>
  <text x="320" y="245" class="text">LED#2_instance</text>
  <text x="320" y="265" class="text">频率: 1.2s</text>
  <text x="320" y="283" class="text">亮灭次数: 4次</text>
  <line x1="320" y1="340" x2="320" y2="420" class="arrow"/>

  <!-- Instance 3 -->
  <rect x="420" y="220" width="160" height="120" class="box" rx="6"/>
  <text x="500" y="245" class="text">LED#3_instance</text>
  <text x="500" y="265" class="text">频率: 1.3s</text>
  <text x="500" y="283" class="text">亮灭次数: 2次</text>
  <line x1="500" y1="340" x2="500" y2="420" class="arrow"/>

  <!-- Instance 4 -->
  <rect x="600" y="220" width="160" height="120" class="box" rx="6"/>
  <text x="680" y="245" class="text">LED#4_instance</text>
  <text x="680" y="265" class="text">频率: 0.8s</text>
  <text x="680" y="283" class="text">亮灭次数: 1:3</text>
  <line x1="680" y1="340" x2="680" y2="420" class="arrow"/>

  <!-- Instance 5 -->
  <rect x="780" y="220" width="160" height="120" class="box" rx="6"/>
  <text x="860" y="245" class="text">LED#5_instance</text>
  <text x="860" y="265" class="text">频率: 1.0s</text>
  <text x="860" y="283" class="text">亮灭次数: 1:1</text>
  <line x1="860" y1="340" x2="860" y2="420" class="arrow"/>

  <!-- Instance 6 -->
  <rect x="960" y="220" width="160" height="120" class="box" rx="6"/>
  <text x="1040" y="245" class="text">LED#6_instance</text>
  <text x="1040" y="265" class="text">频率: 1.4s</text>
  <text x="1040" y="283" class="text">亮灭次数: 2:1</text>
  <line x1="1040" y1="340" x2="1040" y2="420" class="arrow"/>

  <!-- connections from top handler down to each instance -->
  <line x1="300" y1="150" x2="300" y2="220" class="arrow"/>
  <line x1="460" y1="150" x2="460" y2="220" class="arrow"/>
  <line x1="620" y1="150" x2="620" y2="220" class="arrow"/>
  <line x1="780" y1="150" x2="780" y2="220" class="arrow"/>
  <line x1="940" y1="150" x2="940" y2="220" class="arrow"/>
  <line x1="1100" y1="150" x2="1100" y2="220" class="arrow"/>

  <!-- simple LED symbol under each vertical arrow -->
  <!-- LED shape: triangle + line -->
  <!-- #1 -->
  <polygon points="120,420 160,440 120,460" fill="#ffffff" stroke="#333" stroke-width="2" />
  <line x1="160" y1="440" x2="180" y2="440" stroke="#333" stroke-width="2"/>
  <!-- #2 -->
  <polygon points="300,420 340,440 300,460" fill="#ffffff" stroke="#333" stroke-width="2" />
  <line x1="340" y1="440" x2="360" y2="440" stroke="#333" stroke-width="2"/>
  <!-- #3 -->
  <polygon points="480,420 520,440 480,460" fill="#ffffff" stroke="#333" stroke-width="2" />
  <line x1="520" y1="440" x2="540" y2="440" stroke="#333" stroke-width="2"/>
  <!-- #4 -->
  <polygon points="660,420 700,440 660,460" fill="#ffffff" stroke="#333" stroke-width="2" />
  <line x1="700" y1="440" x2="720" y2="440" stroke="#333" stroke-width="2"/>
  <!-- #5 -->
  <polygon points="840,420 880,440 840,460" fill="#ffffff" stroke="#333" stroke-width="2" />
  <line x1="880" y1="440" x2="900" y2="440" stroke="#333" stroke-width="2"/>
  <!-- #6 -->
  <polygon points="1020,420 1060,440 1020,460" fill="#ffffff" stroke="#333" stroke-width="2" />
  <line x1="1060" y1="440" x2="1080" y2="440" stroke="#333" stroke-width="2"/>

  <!-- small caption -->
  <text x="20" y="680" class="text">说明: 顶层 `LED_Handler` 管理多个 `LED#n_instance`，每个实例通过 HAL/GPIO 控制单独 LED。</text>
</svg>